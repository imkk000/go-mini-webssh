<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebSSH</title>

    <!-- xterm.js (self-hosted v6.0.0) -->
    <link rel="stylesheet" href="vendor/xterm.css" />
    <script src="vendor/xterm.js"></script>
    <script src="vendor/addon-fit.js"></script>

    <style>
      @font-face {
        font-family: "MonaspiceAr Nerd Font Mono";
        src: url("vendor/fonts/MonaspiceArNerdFontMono-Regular.otf")
          format("opentype");
        font-weight: 400;
        font-style: normal;
      }

      @font-face {
        font-family: "MonaspiceAr Nerd Font Mono";
        src: url("vendor/fonts/MonaspiceArNerdFontMono-Bold.otf")
          format("opentype");
        font-weight: 700;
        font-style: normal;
      }

      @font-face {
        font-family: "MonaspiceAr Nerd Font Mono";
        src: url("vendor/fonts/MonaspiceArNerdFontMono-Italic.otf")
          format("opentype");
        font-weight: 400;
        font-style: italic;
      }

      @font-face {
        font-family: "MonaspiceAr Nerd Font Mono";
        src: url("vendor/fonts/MonaspiceArNerdFontMono-BoldItalic.otf")
          format("opentype");
        font-weight: 700;
        font-style: italic;
      }

      /* ── Theme tokens ── */
      :root {
        --bg-primary: #0d1117;
        --bg-secondary: #161b22;
        --bg-tertiary: #21262d;
        --bg-input: #0d1117;
        --border: #30363d;
        --text-primary: #c9d1d9;
        --text-secondary: #8b949e;
        --text-muted: #6e7681;
        --text-hint: #484f58;
        --text-bright: #e6edf3;
        --accent: #58a6ff;
        --accent-btn: #1f6feb;
        --red: #f85149;
        --red-bg: rgba(248, 81, 73, 0.15);
        --red-bg-soft: rgba(248, 81, 73, 0.12);
        --green: #3fb950;
        --green-btn: #238636;
        --green-btn-hover: #2ea043;
        --green-btn-active: #1a7f37;
        --overlay-bg: #0d1117;
        --overlay-backdrop: rgba(13, 17, 23, 0.82);
        --panel-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      }

      :root[data-theme="light"] {
        --bg-primary: #ffffff;
        --bg-secondary: #f6f8fa;
        --bg-tertiary: #eaeef2;
        --bg-input: #ffffff;
        --border: #d0d7de;
        --text-primary: #24292f;
        --text-secondary: #57606a;
        --text-muted: #6e7781;
        --text-hint: #8c959f;
        --text-bright: #24292f;
        --accent: #0969da;
        --accent-btn: #0969da;
        --red: #cf222e;
        --red-bg: rgba(207, 34, 46, 0.15);
        --red-bg-soft: rgba(207, 34, 46, 0.12);
        --green: #1a7f37;
        --green-btn: #1a7f37;
        --green-btn-hover: #2da44e;
        --green-btn-active: #116329;
        --overlay-bg: #ffffff;
        --overlay-backdrop: rgba(246, 248, 250, 0.85);
        --panel-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── Tab bar ── */
      #tab-bar {
        display: none;
        align-items: center;
        background: var(--bg-secondary);
        border-bottom: 1px solid var(--border);
        height: 36px;
        flex-shrink: 0;
        overflow: hidden;
      }

      #tabs-container {
        display: flex;
        overflow-x: auto;
        flex: 1;
        height: 100%;
        scrollbar-width: none;
      }

      #tabs-container::-webkit-scrollbar {
        display: none;
      }

      .tab {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 0 10px;
        height: 100%;
        background: transparent;
        border: none;
        border-right: 1px solid var(--border);
        color: var(--text-secondary);
        font-size: 0.8rem;
        cursor: pointer;
        white-space: nowrap;
        flex-shrink: 0;
        transition: background 0.1s, color 0.1s;
        border-top: 2px solid transparent;
      }

      .tab.active {
        background: var(--bg-primary);
        color: var(--text-primary);
        border-top-color: var(--accent);
      }

      .tab:hover:not(.active) {
        background: var(--bg-tertiary);
        color: var(--text-primary);
      }

      .tab.disconnected .tab-label::after {
        content: " ●";
        color: var(--red);
        font-size: 0.65rem;
      }

      .tab-label {
        max-width: 160px;
        overflow: hidden;
        text-overflow: ellipsis;
        user-select: none;
      }

      .tab-close {
        display: flex;
        align-items: center;
        justify-content: center;
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 13px;
        line-height: 1;
        cursor: pointer;
        padding: 2px 3px;
        border-radius: 3px;
        flex-shrink: 0;
      }

      .tab-close:hover {
        color: var(--red);
        background: var(--red-bg);
      }

      #new-tab-btn {
        flex-shrink: 0;
        background: none;
        border: none;
        border-left: 1px solid var(--border);
        color: var(--text-secondary);
        font-size: 20px;
        line-height: 1;
        cursor: pointer;
        padding: 0 14px;
        height: 100%;
        transition: background 0.1s, color 0.1s;
      }

      #new-tab-btn:hover {
        color: var(--text-primary);
        background: var(--bg-tertiary);
      }

      /* ── Theme toggle button ── */
      #theme-toggle-btn {
        flex-shrink: 0;
        background: none;
        border: none;
        border-left: 1px solid var(--border);
        color: var(--text-secondary);
        font-size: 16px;
        line-height: 1;
        cursor: pointer;
        padding: 0 12px;
        height: 100%;
        transition: background 0.1s, color 0.1s;
      }

      #theme-toggle-btn:hover {
        color: var(--text-primary);
        background: var(--bg-tertiary);
      }

      /* Floating theme toggle (visible on connect screen) */
      #theme-toggle-float {
        position: fixed;
        top: 10px;
        right: 12px;
        z-index: 150;
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text-secondary);
        font-size: 16px;
        cursor: pointer;
        padding: 5px 10px;
        transition: background 0.15s, color 0.15s;
      }

      #theme-toggle-float:hover {
        color: var(--text-primary);
        background: var(--bg-tertiary);
      }

      /* ── Terminal area ── */
      #terminal-area {
        flex: 1;
        position: relative;
        overflow: hidden;
        display: none;
      }

      .terminal-slot {
        position: absolute;
        inset: 0;
        display: none;
        flex-direction: column;
      }

      .terminal-slot.active {
        display: flex;
      }

      .terminal-container {
        flex: 1;
        padding: 4px;
        overflow: hidden;
      }

      /* ── Connect overlay ── */
      #connect-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
        background: var(--overlay-bg);
      }

      #connect-overlay.with-backdrop {
        background: var(--overlay-backdrop);
      }

      #connect-overlay.hidden {
        display: none;
      }

      /* ── Connect form ── */
      #connect-panel {
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 2rem 2.5rem;
        width: 380px;
        box-shadow: var(--panel-shadow);
        position: relative;
      }

      #connect-panel h1 {
        font-size: 1.4rem;
        margin-bottom: 1.4rem;
        color: var(--accent);
        letter-spacing: 0.05em;
      }

      /* Close button (visible when sessions exist) */
      #cancel-new-btn {
        position: absolute;
        top: 0.7rem;
        right: 0.7rem;
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 1rem;
        cursor: pointer;
        padding: 3px 7px;
        border-radius: 4px;
        line-height: 1;
        display: none;
      }

      #cancel-new-btn:hover {
        color: var(--red);
        background: var(--red-bg-soft);
      }

      /* ── Auth mode tabs ── */
      .auth-tabs {
        display: flex;
        border: 1px solid var(--border);
        border-radius: 6px;
        overflow: hidden;
        margin-bottom: 1rem;
      }

      .auth-tab {
        flex: 1;
        padding: 0.4rem 0;
        background: var(--bg-input);
        border: none;
        color: var(--text-secondary);
        font-size: 0.82rem;
        cursor: pointer;
        transition:
          background 0.15s,
          color 0.15s;
        letter-spacing: 0.04em;
      }

      .auth-tab:not(:last-child) {
        border-right: 1px solid var(--border);
      }

      .auth-tab.active {
        background: var(--accent-btn);
        color: #fff;
      }

      .auth-tab:hover:not(.active) {
        background: var(--bg-tertiary);
        color: var(--text-primary);
      }

      .field {
        display: flex;
        flex-direction: column;
        margin-bottom: 1rem;
      }

      .field label {
        font-size: 0.78rem;
        color: var(--text-secondary);
        margin-bottom: 0.3rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .field input,
      .field textarea {
        width: 100%;
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 0.5rem 0.75rem;
        color: var(--text-primary);
        font-size: 0.95rem;
        outline: none;
        transition: border-color 0.15s;
        font-family: inherit;
        resize: none;
      }

      .field input:focus,
      .field textarea:focus {
        border-color: var(--accent);
      }

      .row {
        display: flex;
        gap: 0.75rem;
      }

      .row .field {
        flex: 1;
      }

      .connect-actions {
        display: flex;
        gap: 0.5rem;
        margin-top: 0.5rem;
      }

      #connect-btn {
        flex: 1;
        padding: 0.6rem;
        background: var(--green-btn);
        border: none;
        border-radius: 6px;
        color: #fff;
        font-size: 1rem;
        cursor: pointer;
        transition: background 0.15s;
      }

      #connect-btn:hover {
        background: var(--green-btn-hover);
      }

      #connect-btn:active {
        background: var(--green-btn-active);
      }

      #clear-btn {
        padding: 0.6rem 1rem;
        background: var(--bg-tertiary);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text-secondary);
        font-size: 1rem;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
      }

      #clear-btn:hover {
        background: var(--border);
        color: var(--text-bright);
      }

      #status {
        margin-top: 0.75rem;
        font-size: 0.85rem;
        min-height: 1.2em;
        text-align: center;
      }

      .status-err {
        color: var(--red);
      }

      .status-ok {
        color: var(--green);
      }

      .status-info {
        color: var(--accent);
      }
    </style>
  </head>

  <body>
    <!-- ── Tab bar (shown when sessions exist) ── -->
    <div id="tab-bar">
      <div id="tabs-container"></div>
      <button id="new-tab-btn" title="New session">+</button>
      <button id="theme-toggle-btn" title="Switch to light theme">☀</button>
    </div>

    <!-- ── Terminal slots (shown when sessions exist) ── -->
    <div id="terminal-area"></div>

    <!-- ── Connect overlay (shown initially and when adding new session) ── -->
    <div id="connect-overlay">
      <div id="connect-panel">
        <button id="cancel-new-btn" title="Cancel">✕</button>
        <h1>&#9112; WebSSH</h1>

        <div class="row">
          <div class="field">
            <label>Host</label>
            <input id="host" type="text" placeholder="192.168.1.1" />
          </div>
          <div class="field" style="max-width: 90px">
            <label>Port</label>
            <input id="port" type="text" value="22" />
          </div>
        </div>

        <div class="field">
          <label>Username</label>
          <input id="username" type="text" placeholder="root" />
        </div>

        <div class="field">
          <label>
            Session Name
            <span style="color: var(--text-hint); font-size: 0.75em">(optional)</span>
          </label>
          <input id="session-name" type="text" placeholder="e.g. prod-server" />
        </div>

        <!-- Auth mode toggle -->
        <div class="auth-tabs">
          <button class="auth-tab active" id="tab-password" type="button">
            Password
          </button>
          <button class="auth-tab" id="tab-key" type="button">
            Private Key
          </button>
        </div>

        <!-- Password section -->
        <div id="auth-password">
          <div class="field">
            <label>Password</label>
            <input id="password" type="password" placeholder="••••••••" />
          </div>
        </div>

        <!-- Private key section -->
        <div id="auth-key" style="display: none">
          <div class="field">
            <label>
              Private Key
              <span style="color: var(--text-hint); font-size: 0.75em"
                >(paste PEM content)</span
              >
            </label>
            <textarea
              id="keytext"
              rows="6"
              placeholder="-----BEGIN OPENSSH PRIVATE KEY-----"
              style="font-family: monospace; font-size: 0.8rem; line-height: 1.4"
            ></textarea>
          </div>
          <div class="field">
            <label>
              Passphrase
              <span style="color: var(--text-hint); font-size: 0.75em">(optional)</span>
            </label>
            <input
              id="passphrase"
              type="password"
              placeholder="leave blank if key is unencrypted"
            />
          </div>
        </div>

        <div class="connect-actions">
          <button id="connect-btn">Connect</button>
          <button id="clear-btn" title="Clear form">Clear</button>
        </div>
        <div id="status"></div>
      </div>
    </div>

    <!-- Floating theme toggle (visible on connect screen before any session) -->
    <button id="theme-toggle-float" title="Switch to light theme">☀</button>

    <script>
      (function () {
        "use strict";

        /* ── DOM refs ── */
        const tabBar = document.getElementById("tab-bar");
        const tabsContainer = document.getElementById("tabs-container");
        const newTabBtn = document.getElementById("new-tab-btn");
        const terminalArea = document.getElementById("terminal-area");
        const connectOverlay = document.getElementById("connect-overlay");
        const cancelNewBtn = document.getElementById("cancel-new-btn");
        const hostInput = document.getElementById("host");
        const portInput = document.getElementById("port");
        const userInput = document.getElementById("username");
        const sessionNameInput = document.getElementById("session-name");
        const passInput = document.getElementById("password");
        const tabPassword = document.getElementById("tab-password");
        const tabKey = document.getElementById("tab-key");
        const authPassword = document.getElementById("auth-password");
        const authKey = document.getElementById("auth-key");
        const keyTextInput = document.getElementById("keytext");
        const passphraseInput = document.getElementById("passphrase");
        const connectBtn = document.getElementById("connect-btn");
        const statusDiv = document.getElementById("status");
        const themeToggleBtn = document.getElementById("theme-toggle-btn");
        const themeToggleFloat = document.getElementById("theme-toggle-float");

        /* ── Session state ── */
        // Map<id, {ws, term, fitAddon, resizeObserver, tabEl, slotEl, aesKey}>
        const sessions = new Map();
        let activeId = null;
        let nextId = 0;
        let authMode = "password"; // 'password' | 'key'

        function setStatus(msg, cls) {
          statusDiv.textContent = msg;
          statusDiv.className = cls ? "status-" + cls : "";
        }

        /* ── Theme management ── */
        const TERMINAL_THEMES = {
          dark: {
            background: "#0d1117",
            foreground: "#c9d1d9",
            cursor: "#58a6ff",
            black: "#484f58",
            red: "#ff7b72",
            green: "#3fb950",
            yellow: "#d29922",
            blue: "#58a6ff",
            magenta: "#bc8cff",
            cyan: "#39c5cf",
            white: "#b1bac4",
            brightBlack: "#6e7681",
            brightWhite: "#ffffff",
          },
          light: {
            background: "#ffffff",
            foreground: "#1f2328",
            cursor: "#0969da",
            black: "#57606a",
            red: "#cf222e",
            green: "#1a7f37",
            yellow: "#9a6700",
            blue: "#0969da",
            magenta: "#8250df",
            cyan: "#0a3069",
            white: "#6e7781",
            brightBlack: "#8c959f",
            brightWhite: "#1f2328",
          },
        };

        let currentTheme = localStorage.getItem("webssh-theme") || "dark";

        function applyTheme(theme) {
          currentTheme = theme;
          if (theme === "light") {
            document.documentElement.setAttribute("data-theme", "light");
          } else {
            document.documentElement.removeAttribute("data-theme");
          }
          const icon = theme === "dark" ? "☀" : "🌙";
          const title = theme === "dark" ? "Switch to light theme" : "Switch to dark theme";
          themeToggleBtn.textContent = icon;
          themeToggleBtn.title = title;
          themeToggleFloat.textContent = icon;
          themeToggleFloat.title = title;

          /* Update all open terminals */
          const termTheme = TERMINAL_THEMES[theme];
          sessions.forEach(function (s) {
            if (s.term) s.term.options.theme = termTheme;
          });

          localStorage.setItem("webssh-theme", theme);
        }

        function toggleTheme() {
          applyTheme(currentTheme === "dark" ? "light" : "dark");
        }

        themeToggleBtn.addEventListener("click", toggleTheme);
        themeToggleFloat.addEventListener("click", toggleTheme);

        /* Apply saved theme immediately */
        applyTheme(currentTheme);

        /* ── Auth tab switching ── */
        tabPassword.addEventListener("click", function () {
          authMode = "password";
          tabPassword.classList.add("active");
          tabKey.classList.remove("active");
          authPassword.style.display = "";
          authKey.style.display = "none";
        });

        tabKey.addEventListener("click", function () {
          authMode = "key";
          tabKey.classList.add("active");
          tabPassword.classList.remove("active");
          authKey.style.display = "";
          authPassword.style.display = "none";
        });

        /* ── Connect overlay helpers ── */
        function showConnectOverlay(cancellable) {
          connectOverlay.classList.remove("hidden");
          connectOverlay.classList.toggle("with-backdrop", cancellable);
          cancelNewBtn.style.display = cancellable ? "" : "none";
          /* Hide float toggle when tab bar is visible (it has the tab-bar toggle) */
          themeToggleFloat.style.display = cancellable ? "none" : "";
          sessionNameInput.value = "";
          setStatus("", "");
          connectBtn.disabled = false;
        }

        function hideConnectOverlay() {
          connectOverlay.classList.add("hidden");
        }

        /* ── WebSocket URL ── */
        function buildWsUrl() {
          const proto = window.location.protocol === "https:" ? "wss:" : "ws:";
          return proto + "//" + window.location.host + "/ws";
        }

        /* ── Crypto helpers (Web Crypto API + AES-256-GCM) ── */

        function base64ToBytes(b64) {
          return Uint8Array.from(atob(b64), function (c) {
            return c.charCodeAt(0);
          });
        }

        function bytesToBase64(bytes) {
          return btoa(String.fromCharCode.apply(null, bytes));
        }

        async function encryptMsg(aesKey, plaintext) {
          const nonce = crypto.getRandomValues(new Uint8Array(12));
          const ciphertext = await crypto.subtle.encrypt(
            { name: "AES-GCM", iv: nonce },
            aesKey,
            plaintext,
          );
          const out = new Uint8Array(12 + ciphertext.byteLength);
          out.set(nonce, 0);
          out.set(new Uint8Array(ciphertext), 12);
          return out;
        }

        async function decryptMsg(aesKey, data) {
          return crypto.subtle.decrypt(
            { name: "AES-GCM", iv: data.slice(0, 12) },
            aesKey,
            data.slice(12),
          );
        }

        /* Perform ECDH key exchange with the server.
         * serverPubB64 – base64-encoded uncompressed P-256 point from server.
         * ws            – the open WebSocket to send our public key on.
         * Returns a non-extractable AES-256-GCM CryptoKey. */
        async function doKeyExchange(ws, serverPubB64) {
          /* Generate ephemeral ECDH key pair */
          const kp = await crypto.subtle.generateKey(
            { name: "ECDH", namedCurve: "P-256" },
            false,
            ["deriveBits"],
          );

          /* Send client public key to server (plain text frame) */
          const clientPubBytes = await crypto.subtle.exportKey("raw", kp.publicKey);
          ws.send(
            JSON.stringify({
              type: "key",
              pub: bytesToBase64(new Uint8Array(clientPubBytes)),
            }),
          );

          /* Import server public key */
          const serverPub = await crypto.subtle.importKey(
            "raw",
            base64ToBytes(serverPubB64),
            { name: "ECDH", namedCurve: "P-256" },
            false,
            [],
          );

          /* Derive shared bits */
          const sharedBits = await crypto.subtle.deriveBits(
            { name: "ECDH", public: serverPub },
            kp.privateKey,
            256,
          );

          /* HKDF-SHA256 → AES-256-GCM key  (must match Go side) */
          const baseKey = await crypto.subtle.importKey(
            "raw",
            sharedBits,
            { name: "HKDF" },
            false,
            ["deriveKey"],
          );

          return crypto.subtle.deriveKey(
            {
              name: "HKDF",
              hash: "SHA-256",
              salt: new TextEncoder().encode("webssh-session"),
              info: new TextEncoder().encode("aes-256-gcm-key"),
            },
            baseKey,
            { name: "AES-GCM", length: 256 },
            false,
            ["encrypt", "decrypt"],
          );
        }

        /* ── Create a tab DOM element ── */
        function createTabEl(id, label) {
          const tab = document.createElement("div");
          tab.className = "tab";
          tab.dataset.id = id;

          const labelEl = document.createElement("span");
          labelEl.className = "tab-label";
          labelEl.textContent = label;

          const closeBtn = document.createElement("button");
          closeBtn.className = "tab-close";
          closeBtn.title = "Close session";
          closeBtn.textContent = "×";
          closeBtn.addEventListener("click", function (e) {
            e.stopPropagation();
            closeSession(id);
          });

          tab.appendChild(labelEl);
          tab.appendChild(closeBtn);
          tab.addEventListener("click", function () {
            switchTab(id);
          });

          tabsContainer.appendChild(tab);
          return tab;
        }

        /* ── Create a terminal slot DOM element ── */
        function createSlotEl(id) {
          const slot = document.createElement("div");
          slot.className = "terminal-slot";
          slot.dataset.id = id;

          const container = document.createElement("div");
          container.className = "terminal-container";
          slot.appendChild(container);

          terminalArea.appendChild(slot);
          return slot;
        }

        /* ── Switch active tab ── */
        function switchTab(id) {
          sessions.forEach(function (s) {
            s.tabEl.classList.remove("active");
            s.slotEl.classList.remove("active");
          });
          const s = sessions.get(id);
          if (!s) return;
          s.tabEl.classList.add("active");
          s.slotEl.classList.add("active");
          activeId = id;
          /* Re-fit after becoming visible (was hidden before) */
          if (s.fitAddon) s.fitAddon.fit();
          if (s.term) s.term.focus();
        }

        /* ── Set up xterm.js in a slot ── */
        function setupTerminal(id, user, host, port) {
          const s = sessions.get(id);
          if (!s) return;

          const term = new Terminal({
            cursorBlink: true,
            fontSize: 14,
            fontFamily:
              "'MonaspiceAr Nerd Font Mono', 'JetBrains Mono', 'Fira Code', monospace",
            theme: TERMINAL_THEMES[currentTheme],
          });

          const fitAddon = new FitAddon.FitAddon();
          term.loadAddon(fitAddon);

          const container = s.slotEl.querySelector(".terminal-container");
          term.open(container);
          fitAddon.fit();

          /* Forward keystrokes to SSH (encrypted) */
          term.onData(async function (data) {
            if (s.ws && s.ws.readyState === WebSocket.OPEN && s.aesKey) {
              const enc = await encryptMsg(
                s.aesKey,
                new TextEncoder().encode(data),
              );
              s.ws.send(enc);
            }
          });

          /* Send resize events (encrypted) */
          term.onResize(async function (size) {
            if (s.ws && s.ws.readyState === WebSocket.OPEN && s.aesKey) {
              const enc = await encryptMsg(
                s.aesKey,
                new TextEncoder().encode(
                  JSON.stringify({
                    type: "resize",
                    cols: size.cols,
                    rows: size.rows,
                  }),
                ),
              );
              s.ws.send(enc);
            }
          });

          /* Re-fit on container resize */
          const resizeObserver = new ResizeObserver(function () {
            fitAddon.fit();
          });
          resizeObserver.observe(container);

          s.term = term;
          s.fitAddon = fitAddon;
          s.resizeObserver = resizeObserver;

          /* Update tab label – use custom name if set, else default */
          s.tabEl.querySelector(".tab-label").textContent =
            s.customName || user + "@" + host + ":" + port;

          term.focus();
        }

        /* ── Open a new SSH session ── */
        function connect() {
          const host = hostInput.value.trim();
          const port = portInput.value.trim() || "22";
          const user = userInput.value.trim();
          const customName = sessionNameInput.value.trim();

          if (!host || !user) {
            setStatus("Host and Username are required.", "err");
            return;
          }

          const payload = { host, port, username: user };

          if (authMode === "key") {
            const keyText = keyTextInput.value.trim();
            if (!keyText) {
              setStatus("Please paste a private key.", "err");
              return;
            }
            payload.private_key = keyText;
            payload.passphrase = passphraseInput.value;
          } else {
            payload.password = passInput.value;
          }

          setStatus("Connecting\u2026", "info");
          connectBtn.disabled = true;

          const id = nextId++;

          /* Create tab (placeholder label until key exchange completes) */
          const tabEl = createTabEl(id, customName || host + ":" + port);
          const slotEl = createSlotEl(id);

          sessions.set(id, {
            ws: null,
            term: null,
            fitAddon: null,
            resizeObserver: null,
            tabEl: tabEl,
            slotEl: slotEl,
            aesKey: null, // set after key exchange
            customName: customName,
          });

          /* Show workspace immediately */
          tabBar.style.display = "flex";
          terminalArea.style.display = "block";
          themeToggleFloat.style.display = "none";
          switchTab(id);
          hideConnectOverlay();

          const ws = new WebSocket(buildWsUrl());
          ws.binaryType = "arraybuffer";
          sessions.get(id).ws = ws;

          /* ws.onmessage handles both the key-exchange text frame (first) and
           * all subsequent encrypted binary frames. */
          ws.onmessage = async function (ev) {
            const s = sessions.get(id);
            if (!s) return;

            /* ── Key exchange (server sends a plain text frame first) ── */
            if (!(ev.data instanceof ArrayBuffer)) {
              if (s.aesKey) return; // already done
              let serverKeyMsg;
              try {
                serverKeyMsg = JSON.parse(ev.data);
              } catch (e) {
                return;
              }
              if (serverKeyMsg.type !== "key") return;

              try {
                const aesKey = await doKeyExchange(ws, serverKeyMsg.pub);
                s.aesKey = aesKey;

                /* Send encrypted SSH config */
                const enc = await encryptMsg(
                  aesKey,
                  new TextEncoder().encode(JSON.stringify(payload)),
                );
                ws.send(enc);

                /* Now that encryption is ready, set up the terminal */
                setupTerminal(id, user, host, port);
              } catch (e) {
                closeSession(id);
                showConnectOverlay(sessions.size > 0);
                setStatus("Key exchange failed.", "err");
              }
              return;
            }

            /* ── Encrypted terminal data ── */
            if (!s.aesKey || !s.term) return;
            try {
              const plain = await decryptMsg(s.aesKey, new Uint8Array(ev.data));
              s.term.write(new Uint8Array(plain));
            } catch (e) {
              /* Authentication tag mismatch – something is wrong */
              if (s.term) s.term.write("\r\n\x1b[31m[decrypt error]\x1b[0m\r\n");
            }
          };

          ws.onclose = function () {
            const s = sessions.get(id);
            if (!s) return;
            if (s.term) {
              s.term.write("\r\n\x1b[31m[connection closed]\x1b[0m\r\n");
            }
            /* Auto-close the tab after a moment so any final output is visible */
            setTimeout(function () {
              closeSession(id);
            }, 1500);
          };

          ws.onerror = function () {
            const s = sessions.get(id);
            if (!s) return;
            if (s.term) {
              s.term.write("\r\n\x1b[31m[websocket error]\x1b[0m\r\n");
            } else {
              closeSession(id);
              showConnectOverlay(sessions.size > 0);
              setStatus("Connection failed \u2013 check server/TLS.", "err");
            }
          };
        }

        /* ── Close a session (and clean up) ── */
        function closeSession(id) {
          const s = sessions.get(id);
          if (!s) return;

          /* Disconnect WebSocket */
          if (s.ws) {
            s.ws.onclose = null; /* suppress post-close handlers */
            s.ws.close();
          }

          /* Dispose terminal */
          if (s.resizeObserver) s.resizeObserver.disconnect();
          if (s.term) s.term.dispose();

          /* Remove DOM */
          s.tabEl.remove();
          s.slotEl.remove();
          sessions.delete(id);

          if (sessions.size === 0) {
            tabBar.style.display = "none";
            terminalArea.style.display = "none";
            activeId = null;
            showConnectOverlay(false);
          } else if (activeId === id) {
            const lastId = Array.from(sessions.keys()).pop();
            switchTab(lastId);
          }
        }

        /* ── Disconnect all sessions on page unload ── */
        window.addEventListener("beforeunload", function () {
          sessions.forEach(function (s) {
            if (s.ws) s.ws.close();
          });
        });

        /* ── Re-fit terminal when returning from another app (iPad / mobile) ──
         * iOS/iPadOS pauses layout when you switch apps. On return the viewport
         * may have changed but ResizeObserver doesn't reliably fire. We listen
         * for visibilitychange and window focus, then re-fit after a short delay
         * to let the browser finish compositing the new viewport dimensions. */
        function refitActive() {
          if (activeId === null) return;
          const s = sessions.get(activeId);
          if (s && s.fitAddon) s.fitAddon.fit();
        }

        document.addEventListener("visibilitychange", function () {
          if (document.visibilityState === "visible") {
            setTimeout(refitActive, 100);
          }
        });

        window.addEventListener("focus", function () {
          setTimeout(refitActive, 100);
        });

        /* pageshow covers iOS back-forward cache restores */
        window.addEventListener("pageshow", function () {
          setTimeout(refitActive, 100);
        });

        /* ── Button and keyboard event listeners ── */
        connectBtn.addEventListener("click", connect);

        document.getElementById("clear-btn").addEventListener("click", function () {
          hostInput.value = "";
          portInput.value = "22";
          userInput.value = "";
          passInput.value = "";
          keyTextInput.value = "";
          passphraseInput.value = "";
          sessionNameInput.value = "";
          authPassword.style.display = "";
          authKey.style.display = "none";
          tabPassword.classList.add("active");
          tabKey.classList.remove("active");
          setStatus("", "");
          hostInput.focus();
        });

        newTabBtn.addEventListener("click", function () {
          showConnectOverlay(true);
        });

        cancelNewBtn.addEventListener("click", function () {
          hideConnectOverlay();
          if (activeId !== null) {
            const s = sessions.get(activeId);
            if (s && s.term) s.term.focus();
          }
        });

        /* Close overlay with Escape key */
        document.addEventListener("keydown", function (e) {
          if (
            e.key === "Escape" &&
            !connectOverlay.classList.contains("hidden") &&
            sessions.size > 0
          ) {
            hideConnectOverlay();
            if (activeId !== null) {
              const s = sessions.get(activeId);
              if (s && s.term) s.term.focus();
            }
          }
        });

        /* Click on backdrop to close when sessions exist */
        connectOverlay.addEventListener("click", function (e) {
          if (e.target === connectOverlay && sessions.size > 0) {
            hideConnectOverlay();
            if (activeId !== null) {
              const s = sessions.get(activeId);
              if (s && s.term) s.term.focus();
            }
          }
        });

        /* Allow Enter in form fields to trigger connect */
        [hostInput, portInput, userInput, passInput, passphraseInput].forEach(
          function (el) {
            el.addEventListener("keydown", function (e) {
              if (e.key === "Enter") connect();
            });
          },
        );
      })();
    </script>
  </body>
</html>
